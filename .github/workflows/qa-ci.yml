name: QA Continuous Integration

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop", "staging" ]

# 🔐 Permisos mínimos (principio de menor privilegio)
permissions:
  contents: read

# 🚫 Cancelar ejecuciones previas del mismo PR (ahorra minutos de CI)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: Análisis estático (rápido, ~30 seg)
  # ═══════════════════════════════════════════
  static-analysis:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

  # ═══════════════════════════════════════════
  # JOB 2: Tests E2E con Playwright
  # ═══════════════════════════════════════════
  e2e-tests:
    name: 🎭 Playwright E2E
    runs-on: ubuntu-latest
    needs: static-analysis
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Seed test database (Local config only)
        if: github.ref != 'refs/heads/staging' && github.base_ref != 'staging'
        run: npm run db:seed:test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Playwright tests (Main/Develop)
        if: github.ref != 'refs/heads/staging' && github.base_ref != 'staging'
        run: npx playwright test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000

      - name: Run Playwright tests (Staging)
        if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
        run: npm run test:staging

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report*/
          retention-days: 10

  # ═══════════════════════════════════════════
  # JOB 3: Auditoría de seguridad
  # ═══════════════════════════════════════════
  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
