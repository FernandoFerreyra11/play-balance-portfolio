name: QA Post-Deploy Staging

# Este workflow se dispara SOLAMENTE cuando GitHub recibe la notificación
# (de Vercel, por ejemplo) de que un despliegue ha finalizado.
on:
  deployment_status:

permissions:
  contents: read

jobs:
  e2e-staging:
    # Solo corremos esto si el despliegue fue EXITOSO y es en el entorno Preview (Staging)
    # Evitamos correr tests E2E mutativos (que crean usuarios) en Producción.
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview'
    name: 🎭 Playwright E2E on Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium firefox

      # NOTA: Como Vercel ya conectó la app de Staging con tu DB de Testing (Neon),
      # la app ya está lista. Solo necesitamos asegurarnos de que los usuarios de
      # prueba existan (o no existan si el test crea nuevos).
      - name: Seed test database (Staging Neon DB)
        run: npm run db:seed:test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run Playwright tests on Staging
        # Pasamos la URL dinámica que nos da Vercel para este PR
        run: npm run test:staging
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.target_url }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-staging-report
          path: playwright-report-staging/
          retention-days: 10
